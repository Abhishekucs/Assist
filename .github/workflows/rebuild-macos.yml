name: Rebuild macOS

on:
  push:
    branches:
      - main
    paths:
      - "apps/macos/**"
      - ".github/workflows/rebuild-macos.yml"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: rebuild-macos-${{ github.ref }}
  cancel-in-progress: true

jobs:
  rebuild-macos:
    name: Rebuild macOS
    runs-on: macos-15
    timeout-minutes: 20

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Build macOS application
        env:
          # This workflow verifies the debug bundle but does not release it.
          # Trusted Developer ID signing remains isolated to release.yml.
          ASSIST_ALLOW_ADHOC_DEBUG_SIGNING: "1"
        run: make -C apps/macos build
