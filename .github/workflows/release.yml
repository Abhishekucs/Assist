name: Release macOS DMG

on:
  push:
    tags:
      - "macos-v*"
  workflow_dispatch:
    inputs:
      version:
        description: "Version to package. Defaults to Info.plist CFBundleShortVersionString."
        required: false
        type: string
      prerelease:
        description: "Mark the GitHub release as a prerelease."
        required: false
        type: boolean
        default: false

permissions:
  contents: write

concurrency:
  group: macos-release-${{ github.ref_name || github.run_id }}
  cancel-in-progress: false

env:
  APPLE_TEAM_ID: 4M5LV534N5
  APPLE_DEVELOPER_ID_APPLICATION_IDENTITY: "Developer ID Application: THINKING SOUND LAB PRIVATE LIMITED (4M5LV534N5)"

jobs:
  release-scope:
    name: Detect macOS release scope
    runs-on: ubuntu-latest
    outputs:
      should_release: ${{ steps.scope.outputs.should_release }}
      reason: ${{ steps.scope.outputs.reason }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Decide whether macOS release is needed
        id: scope
        shell: bash
        run: |
          set -euo pipefail

          should_release="false"
          reason="No macOS release inputs changed since the previous macOS release tag."

          if [[ "${GITHUB_EVENT_NAME:-}" == "workflow_dispatch" ]]; then
            should_release="true"
            reason="Manual workflow dispatch explicitly requested a macOS release."
          else
            current_tag="${GITHUB_REF_NAME:-}"
            previous_tag="$(
              git tag --merged HEAD --sort=-v:refname -l 'macos-v*' \
                | grep -vx "$current_tag" \
                | head -n 1 || true
            )"
            if [[ -z "$previous_tag" ]]; then
              previous_tag="$(
                git tag --merged HEAD --sort=-v:refname -l 'v*' \
                  | grep -Ev '^macos-v' \
                  | grep -vx "$current_tag" \
                  | head -n 1 || true
              )"
            fi

            if [[ -z "$previous_tag" ]]; then
              should_release="true"
              reason="No previous macOS or legacy release tag was found."
            else
              changed_files="$(git diff --name-only "$previous_tag" HEAD)"

              if printf "%s\n" "$changed_files" | grep -Eq '^apps/macos/|^\.github/workflows/release\.yml$'; then
                should_release="true"
                reason="macOS app or macOS release workflow files changed since $previous_tag."
              fi
            fi
          fi

          echo "should_release=$should_release" >> "$GITHUB_OUTPUT"
          echo "reason=$reason" >> "$GITHUB_OUTPUT"

          {
            echo "### macOS release scope"
            echo ""
            echo "- Should release: \`$should_release\`"
            echo "- Reason: $reason"
          } >> "$GITHUB_STEP_SUMMARY"

  build-release:
    name: Build, notarize, and release
    needs: release-scope
    if: needs.release-scope.outputs.should_release == 'true'
    runs-on: macos-15
    timeout-minutes: 30

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Validate release secrets
        env:
          APPLE_DEVELOPER_ID_APPLICATION_CERTIFICATE_BASE64: ${{ secrets.APPLE_DEVELOPER_ID_APPLICATION_CERTIFICATE_BASE64 }}
          APPLE_DEVELOPER_ID_APPLICATION_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_DEVELOPER_ID_APPLICATION_CERTIFICATE_PASSWORD }}
          APPLE_KEYCHAIN_PASSWORD: ${{ secrets.APPLE_KEYCHAIN_PASSWORD }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
        shell: bash
        run: |
          set -euo pipefail

          missing=0
          for name in \
            APPLE_DEVELOPER_ID_APPLICATION_CERTIFICATE_BASE64 \
            APPLE_DEVELOPER_ID_APPLICATION_CERTIFICATE_PASSWORD \
            APPLE_KEYCHAIN_PASSWORD \
            APPLE_ID \
            APPLE_APP_SPECIFIC_PASSWORD
          do
            if [[ -z "${!name}" ]]; then
              echo "::error title=Missing GitHub secret::$name is required for notarized macOS releases"
              missing=1
            fi
          done

          exit "$missing"

      - name: Select release version
        id: version
        env:
          REQUESTED_VERSION: ${{ github.event.inputs.version || '' }}
        shell: bash
        run: |
          set -euo pipefail

          PLIST_VERSION=$(/usr/libexec/PlistBuddy -c "Print :CFBundleShortVersionString" apps/macos/Sources/Assist/Resources/Info.plist)

          if [[ "${GITHUB_REF_TYPE:-}" == "tag" ]]; then
            if [[ "${GITHUB_REF_NAME:-}" != macos-v* ]]; then
              echo "error: macOS releases must use tags like macos-v0.1.0" >&2
              exit 1
            fi

            VERSION="${GITHUB_REF_NAME#macos-v}"
          elif [[ -n "$REQUESTED_VERSION" ]]; then
            VERSION="$REQUESTED_VERSION"
          else
            VERSION="$PLIST_VERSION"
          fi

          if [[ "$VERSION" != "$PLIST_VERSION" ]]; then
            echo "error: release version $VERSION does not match Info.plist version $PLIST_VERSION" >&2
            exit 1
          fi

          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "tag=macos-v$VERSION" >> "$GITHUB_OUTPUT"

      - name: Import Developer ID certificate
        env:
          CERTIFICATE_BASE64: ${{ secrets.APPLE_DEVELOPER_ID_APPLICATION_CERTIFICATE_BASE64 }}
          CERTIFICATE_PASSWORD: ${{ secrets.APPLE_DEVELOPER_ID_APPLICATION_CERTIFICATE_PASSWORD }}
          KEYCHAIN_PASSWORD: ${{ secrets.APPLE_KEYCHAIN_PASSWORD }}
        shell: bash
        run: |
          set -euo pipefail

          CERTIFICATE_PATH="$RUNNER_TEMP/developer-id-application.p12"
          KEYCHAIN_PATH="$RUNNER_TEMP/app-signing.keychain-db"

          echo "$CERTIFICATE_BASE64" | base64 --decode > "$CERTIFICATE_PATH"
          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security import "$CERTIFICATE_PATH" -P "$CERTIFICATE_PASSWORD" -A -t cert -f pkcs12 -k "$KEYCHAIN_PATH"
          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security list-keychains -d user -s "$KEYCHAIN_PATH"
          security find-identity -v -p codesigning "$KEYCHAIN_PATH"

          if ! security find-identity -v -p codesigning "$KEYCHAIN_PATH" | grep -F "\"$APPLE_DEVELOPER_ID_APPLICATION_IDENTITY\"" >/dev/null; then
            echo "::error title=Missing signing identity::Imported certificate does not contain $APPLE_DEVELOPER_ID_APPLICATION_IDENTITY"
            exit 1
          fi

      - name: Build DMG
        env:
          ASSIST_SIGN_IDENTITY: ${{ env.APPLE_DEVELOPER_ID_APPLICATION_IDENTITY }}
          ASSIST_REQUIRE_SIGNING: "1"
          ASSIST_HARDENED_RUNTIME: "1"
          ASSIST_TIMESTAMP: "1"
        run: apps/macos/scripts/package_dmg.sh release "${{ steps.version.outputs.version }}"

      - name: Notarize DMG
        env:
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
        shell: bash
        run: |
          set -euo pipefail

          DMG_PATH=$(cat apps/macos/.build/dmg_path)
          xcrun notarytool submit "$DMG_PATH" \
            --apple-id "$APPLE_ID" \
            --password "$APPLE_APP_SPECIFIC_PASSWORD" \
            --team-id "$APPLE_TEAM_ID" \
            --wait
          xcrun stapler staple "$DMG_PATH"
          xcrun stapler validate "$DMG_PATH"

      - name: Verify DMG
        shell: bash
        run: |
          set -euo pipefail

          DMG_PATH=$(cat apps/macos/.build/dmg_path)
          MOUNT_DIR=$(mktemp -d "$RUNNER_TEMP/assist-dmg-XXXXXX")
          attached=0
          cleanup() {
            if [[ "$attached" == "1" ]]; then
              hdiutil detach "$MOUNT_DIR" >/dev/null || true
            fi
            rmdir "$MOUNT_DIR" >/dev/null 2>&1 || true
          }
          trap cleanup EXIT

          hdiutil verify "$DMG_PATH"
          xcrun stapler validate "$DMG_PATH"
          spctl -a -vv --type open --context context:primary-signature "$DMG_PATH"
          codesign --verify --verbose=2 "$DMG_PATH"

          hdiutil attach "$DMG_PATH" -nobrowse -readonly -mountpoint "$MOUNT_DIR"
          attached=1
          spctl -a -vv --type execute "$MOUNT_DIR/Assist.app"
          codesign --verify --deep --strict --verbose=2 "$MOUNT_DIR/Assist.app"

      - name: Create stable DMG alias
        shell: bash
        run: |
          set -euo pipefail

          DMG_PATH=$(cat apps/macos/.build/dmg_path)
          cp "$DMG_PATH" apps/macos/.build/dist/Assist.dmg

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: Assist-${{ steps.version.outputs.version }}-dmg
          path: |
            apps/macos/.build/dist/Assist-${{ steps.version.outputs.version }}.dmg
            apps/macos/.build/dist/Assist.dmg

      - name: Create or update GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
          IS_PRERELEASE: ${{ github.event.inputs.prerelease || 'false' }}
        shell: bash
        run: |
          set -euo pipefail

          TAG="${{ steps.version.outputs.tag }}"
          VERSION="${{ steps.version.outputs.version }}"
          DMG_PATH=$(cat apps/macos/.build/dmg_path)
          ALIAS_PATH="apps/macos/.build/dist/Assist.dmg"

          if gh release view "$TAG" >/dev/null 2>&1; then
            gh release upload "$TAG" "$DMG_PATH" "$ALIAS_PATH" --clobber
          else
            CREATE_ARGS=(
              "$TAG"
              "$DMG_PATH"
              "$ALIAS_PATH"
              --title "Assist $VERSION"
              --generate-notes
            )
            if [[ "${GITHUB_REF_TYPE:-}" != "tag" ]]; then
              CREATE_ARGS+=(--target "$GITHUB_SHA")
            fi
            if [[ "$IS_PRERELEASE" == "true" ]]; then
              CREATE_ARGS+=(--prerelease)
            fi

            gh release create "${CREATE_ARGS[@]}"
          fi
